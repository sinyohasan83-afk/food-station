name: Deploy to InfinityFree

on:
  push:
    branches: [ main ]

jobs:
  ftp-deploy:
    name: Upload perubahan lewat FTP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ./
          # state-name diganti supaya file pelacak sync yang lama (kemungkinan sudah
          # tidak sinkron dengan isi server) diabaikan dan SEMUA file di-upload ulang
          # sekali ini. Tidak menghapus apa pun (dangerous-clean-slate tetap mati).
          state-name: .ftp-deploy-sync-state-v2.json
          log-level: verbose
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/database/**
            **/.gitignore
            includes/db.config.php
