name: Deploy to InfinityFree

on:
  push:
    branches: [ main ]

jobs:
  ftp-deploy:
    name: Upload perubahan lewat FTP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Upload semua file lewat lftp mirror (tanpa hapus)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" <<'EOF'
          set ssl:verify-certificate no
          set net:max-retries 3
          set net:timeout 20
          set mirror:parallel-transfer-count 3
          mirror --reverse --verbose \
            --exclude-glob .git* \
            --exclude-glob .github/ \
            --exclude-glob database/ \
            --exclude ^includes/db\.config\.php$ \
            ./ ./
          bye
          EOF
