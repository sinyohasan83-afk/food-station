name: Deploy to InfinityFree

on:
  push:
    branches: [ main ]

jobs:
  ftp-deploy:
    name: Upload perubahan lewat FTP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # PENTING: di InfinityFree, isi website yang benar-benar dilayani ke publik
          # ada di dalam folder htdocs/, bukan langsung di root akun FTP. server-dir
          # sebelumnya "./" salah — upload jadi mendarat di SAMPING htdocs, bukan di
          # dalamnya, makanya situs live tidak pernah berubah walau deploy "success".
          server-dir: ./htdocs/
          # state-name diganti supaya file pelacak sync yang lama (yang terlanjur
          # mencatat lokasi salah) diabaikan dan SEMUA file di-upload ulang ke lokasi
          # yang benar. Tidak menghapus apa pun (dangerous-clean-slate tetap mati).
          state-name: .ftp-deploy-sync-state-htdocs.json
          log-level: verbose
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/database/**
            **/.gitignore
            includes/db.config.php
